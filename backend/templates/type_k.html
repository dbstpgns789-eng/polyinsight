<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
{% include '_shared.css' %}

:root {
  --theme-primary: {{ theme_primary }};
  --theme-dark:    {{ theme_dark }};
}

/* ── Type K: 기관 브랜드 클로징 ── */
.card-canvas {
  background: linear-gradient(135deg, #0A1628 0%, #1A3A6E 50%, #0A1628 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}

.card-canvas::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    repeating-linear-gradient(90deg,
      rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px,
      transparent 1px, transparent 80px),
    repeating-linear-gradient(0deg,
      rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px,
      transparent 1px, transparent 80px);
  pointer-events: none;
}

.closing-top-bar {
  position: absolute; top: 0; left: 0; right: 0;
  height: 8px;
  background: linear-gradient(90deg, var(--theme-primary), var(--theme-dark));
}

.closing-content {
  position: relative; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; text-align: center;
  padding: 0 80px; gap: 0;
}

.closing-org-badge {
  margin-bottom: 44px;
  padding: 12px 36px;
  border: 1.5px solid rgba(255,255,255,0.22);
  border-radius: var(--radius-pill);
  font-size: 22px; font-weight: 600;
  color: rgba(255,255,255,0.75); letter-spacing: 0.04em;
}

.closing-pre-title {
  font-size: 20px; font-weight: 400;
  color: rgba(255,255,255,0.40);
  letter-spacing: 0.02em; margin-bottom: 16px;
}

.closing-main-title {
  font-size: 68px; font-weight: 900;
  line-height: 1.15; letter-spacing: -0.02em;
  color: var(--text-on-dark); word-break: keep-all; margin-bottom: 32px;
}

.closing-divider {
  width: 80px; height: 4px;
  background: var(--theme-primary);
  border-radius: 2px; margin-bottom: 36px; opacity: 0.8;
}

.closing-team {
  font-size: 24px; font-weight: 500;
  color: var(--text-on-dark-muted); margin-bottom: 40px;
}

.closing-cta {
  padding: 18px 48px;
  background: var(--theme-primary);
  border-radius: var(--radius-pill);
  font-size: 24px; font-weight: 700;
  color: var(--text-on-dark); letter-spacing: 0.01em;
}

.closing-footer {
  position: absolute; bottom: 40px;
  font-size: 18px; font-weight: 400;
  color: rgba(255,255,255,0.22); letter-spacing: 0.03em; z-index: 10;
}
</style>
</head>
<body>
<div class="card-canvas">

  <div class="closing-top-bar"></div>

  <div class="closing-content">

    <div class="closing-org-badge">{{ org }}</div>

    {% if pre_title %}
    <div class="closing-pre-title">{{ pre_title }}</div>
    {% endif %}

    <div class="closing-main-title">{{ main_title }}</div>

    <div class="closing-divider"></div>

    {% if team_name %}
    <div class="closing-team">{{ team_name }}</div>
    {% endif %}

    {% if cta %}
    <div class="closing-cta">{{ cta }}</div>
    {% endif %}

  </div>

  <div class="closing-footer">PolyInsight · AI Card News Generator</div>

</div>
</body>
</html>
