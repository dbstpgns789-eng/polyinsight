<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
{% include '_shared.css' %}

:root {
  --theme-primary: {{ theme_primary }};
  --theme-dark:    {{ theme_dark }};
}

/* ── Type B: 범용 헤더+카드형 ── */
.card-canvas {
  background: var(--surface-base);
  display: flex;
  flex-direction: column;
  padding: 72px 60px 60px;
}

.b-card-num {
  position: absolute; top: 60px; right: 60px;
  font-size: 20px; font-weight: 700;
  color: rgba(0,0,0,0.12); letter-spacing: 0.05em;
}

.b-eyebrow {
  font-size: 20px; font-weight: 600;
  color: var(--theme-primary);
  letter-spacing: 0.06em; text-transform: uppercase;
  margin-bottom: 12px;
}

.b-title {
  font-size: 52px; font-weight: 800; line-height: 1.2;
  color: var(--text-primary); word-break: keep-all;
  margin-bottom: 20px;
}

.b-underline {
  width: 60px; height: 6px;
  background: var(--theme-primary);
  border-radius: 3px; margin-bottom: 40px;
}

.b-content-card {
  flex: 1;
  background: var(--surface-card);
  border-radius: var(--radius-card);
  padding: 48px 52px;
  border-left: 8px solid var(--theme-primary);
  display: flex; flex-direction: column;
}

.b-body {
  flex: 1;
  font-size: 26px; font-weight: 400; line-height: 1.7;
  color: var(--text-primary); word-break: keep-all;
}

.b-sub {
  margin-top: 28px; padding-top: 24px;
  border-top: 1px solid rgba(0,0,0,0.07);
  font-size: 22px; font-weight: 400; line-height: 1.6;
  color: var(--text-secondary); word-break: keep-all;
}
</style>
</head>
<body>
<div class="card-canvas">

  <div class="b-card-num">{{ card_num }}</div>

  {% if card_label %}
  <div class="b-eyebrow">{{ card_label }}</div>
  {% endif %}

  <div class="b-title">{{ section_title }}</div>
  <div class="b-underline"></div>

  <div class="b-content-card">
    <div class="b-body">{{ body_text }}</div>
    {% if sub_text %}
    <div class="b-sub">{{ sub_text }}</div>
    {% endif %}
  </div>

</div>
</body>
</html>
