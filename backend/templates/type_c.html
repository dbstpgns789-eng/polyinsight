<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
{% include '_shared.css' %}

:root {
  --theme-primary: {{ theme_primary }};
  --theme-dark:    {{ theme_dark }};
}

/* ── Type C: 수치 강조 그리드형 ── */
.card-canvas {
  background: var(--surface-base);
  display: flex; flex-direction: column;
  padding: 72px 60px 60px;
}

.c-card-num {
  position: absolute; top: 60px; right: 60px;
  font-size: 20px; font-weight: 700;
  color: rgba(0,0,0,0.12); letter-spacing: 0.05em;
}

.c-eyebrow {
  font-size: 20px; font-weight: 600;
  color: var(--theme-primary);
  letter-spacing: 0.06em; text-transform: uppercase;
  margin-bottom: 12px;
}

.c-title {
  font-size: 52px; font-weight: 800; line-height: 1.2;
  color: var(--text-primary); margin-bottom: 12px; word-break: keep-all;
}

.c-problem-strip {
  font-size: 22px; font-weight: 400; line-height: 1.55;
  color: var(--text-secondary);
  margin-bottom: 36px; word-break: keep-all;
}

/* 성과 강조 카드 */
.c-achievement-card {
  flex: 1;
  background: var(--theme-primary);
  border-radius: var(--radius-card);
  padding: 48px 52px;
  display: flex; flex-direction: column;
  justify-content: center; position: relative; overflow: hidden;
}

.c-achievement-card::before {
  content: '';
  position: absolute; top: -80px; right: -80px;
  width: 300px; height: 300px; border-radius: 50%;
  background: rgba(255,255,255,0.08);
}

.c-achievement-label {
  font-size: 18px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: rgba(255,255,255,0.60);
  margin-bottom: 24px;
}

.c-achievement-text {
  font-size: 30px; font-weight: 500; line-height: 1.65;
  color: var(--text-on-dark); word-break: keep-all;
}

/* 수치 강조 (숫자 포함 구문을 크게) */
.c-stat-highlight {
  font-size: 72px; font-weight: 900; line-height: 1.1;
  letter-spacing: -0.02em; color: var(--text-on-dark);
  margin-bottom: 16px;
}

/* 하단 마스코트 버블 */
.c-bubble {
  margin-top: 24px;
  padding: 18px 24px;
  background: rgba(255,255,255,0.12);
  border-radius: 12px;
  border-left: 5px solid rgba(255,255,255,0.5);
  font-size: 20px; font-weight: 500;
  color: rgba(255,255,255,0.85);
  flex-shrink: 0;
}
</style>
</head>
<body>
<div class="card-canvas">

  <div class="c-card-num">{{ card_num }}</div>
  <div class="c-eyebrow">Research Highlights</div>
  <div class="c-title">핵심 성과 수치</div>

  {% if problem %}
  <div class="c-problem-strip">배경: {{ problem }}</div>
  {% endif %}

  <div class="c-achievement-card">
    <div class="c-achievement-label">Achievement</div>
    <div class="c-achievement-text">{{ achievement }}</div>
  </div>

  {% if mascot_bubble %}
  <div class="c-bubble">{{ mascot_bubble }}</div>
  {% endif %}

</div>
</body>
</html>
