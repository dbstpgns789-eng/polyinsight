<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
{% include '_shared.css' %}

:root {
  --theme-primary: {{ theme_primary }};
  --theme-dark:    {{ theme_dark }};
}

/* ── Type E: 훅 / 전면텍스트 레이아웃 ── */
.card-canvas {
  background: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
}

/* 배경 장식 원 */
.deco-circle {
  position: absolute;
  border-radius: 50%;
  background: var(--theme-primary);
  opacity: 0.08;
  pointer-events: none;
}
.deco-circle.lg {
  width: 700px; height: 700px;
  top: -200px; right: -200px;
}
.deco-circle.sm {
  width: 300px; height: 300px;
  bottom: 80px; left: -100px;
}

/* 콘텐츠 */
.hook-content {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 80px 72px;
  z-index: 10;
}

.hook-eyebrow {
  font-size: 22px;
  font-weight: 600;
  color: var(--theme-primary);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 28px;
}

.hook-text {
  font-size: 62px;
  font-weight: 900;
  line-height: 1.2;
  color: var(--text-on-dark);
  word-break: keep-all;
  margin-bottom: 36px;
}

.hook-text .accent {
  color: var(--theme-primary);
}

.hook-divider {
  width: 60px;
  height: 5px;
  background: var(--theme-primary);
  border-radius: 3px;
  margin-bottom: 36px;
}

.hook-sub {
  font-size: 28px;
  font-weight: 400;
  line-height: 1.65;
  color: var(--text-on-dark-muted);
  word-break: keep-all;
  max-width: 860px;
}

/* 키워드 태그 */
.keyword-wrap {
  margin-top: 48px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}

.keyword-tag {
  padding: 8px 20px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 100px;
  font-size: 20px;
  font-weight: 500;
  color: rgba(255,255,255,0.75);
}

/* 카드 번호 */
.card-number {
  position: absolute;
  top: 60px;
  right: 60px;
  font-size: 20px;
  font-weight: 700;
  color: rgba(255,255,255,0.25);
  letter-spacing: 0.05em;
  z-index: 10;
}
</style>
</head>
<body>
<div class="card-canvas">

  <!-- 배경 장식 -->
  <div class="deco-circle lg"></div>
  <div class="deco-circle sm"></div>

  <!-- 카드 번호 -->
  <div class="card-number">02</div>

  <!-- 훅 콘텐츠 -->
  <div class="hook-content">
    {% if eyebrow %}
    <div class="hook-eyebrow">{{ eyebrow }}</div>
    {% endif %}

    <div class="hook-text">{{ intro }}</div>

    <div class="hook-divider"></div>

    {% if keyword_line %}
    <div class="hook-sub">{{ keyword_line }}</div>
    {% endif %}

    {% if footnote %}
    <div class="keyword-wrap">
      {% for tag in footnote.split() %}
      <span class="keyword-tag">{{ tag }}</span>
      {% endfor %}
    </div>
    {% endif %}
  </div>

</div>
</body>
</html>
