<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
{% include '_shared.css' %}

:root {
  --theme-primary: {{ theme_primary }};
  --theme-dark:    {{ theme_dark }};
}

.card-canvas { background: var(--surface-base); }

.cover-badge {
  position: absolute;
  top: 72px; left: 50%;
  transform: translateX(-50%);
  z-index: 10;
}

.cover-title-wrap {
  position: absolute;
  left: 60px; top: 200px;
  width: 700px;
  z-index: 10;
}

.cover-pretitle {
  font-size: 28px; font-weight: 600;
  color: var(--theme-primary);
  margin-bottom: 20px; letter-spacing: 0.02em;
}

.cover-title {
  font-size: 90px; font-weight: 900;
  line-height: 1.05; letter-spacing: -0.02em;
  color: var(--text-primary); word-break: keep-all;
}

.cover-bubble {
  margin-top: 32px;
  font-size: 26px; font-weight: 500;
  color: var(--text-secondary);
  line-height: 1.55; max-width: 600px;
  word-break: keep-all;
}

.triangle-corner {
  position: absolute; bottom: 0; right: 0;
  width: 500px; height: 500px;
  background: var(--theme-primary);
  clip-path: polygon(100% 0, 100% 100%, 0 100%);
  z-index: 5;
}

.triangle-label {
  position: absolute; bottom: 80px; right: 72px;
  font-size: 22px; font-weight: 700;
  color: rgba(255,255,255,0.75);
  text-align: right; z-index: 8; line-height: 1.5;
}

.org-name-bar {
  position: absolute; bottom: 40px; left: 60px;
  font-size: 20px; font-weight: 600;
  color: var(--text-secondary); z-index: 10; letter-spacing: 0.01em;
}
</style>
</head>
<body>
<div class="card-canvas">

  <div class="cover-badge">
    <span class="badge-light">{{ edition_number }}</span>
  </div>

  <div class="cover-title-wrap">
    <div class="cover-pretitle">{{ pretitle }}</div>
    <div class="cover-title">{{ title }}</div>
    {% if mascot_bubble %}
    <div class="cover-bubble">{{ mascot_bubble }}</div>
    {% endif %}
  </div>

  <div class="triangle-corner"></div>
  <div class="triangle-label">{{ org }}<br>{{ dept }}</div>

  <div class="org-name-bar">{{ org }}</div>

</div>
</body>
</html>
