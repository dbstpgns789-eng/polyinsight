<!-- image_slot: bg -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
{% include '_shared.css' %}
:root { --theme-primary: {{ theme_primary }}; --theme-dark: {{ theme_dark }}; }

.card-canvas { background: #111; }

.prob-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.58);
  z-index: 1;
}

.prob-body {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  padding: 72px 68px 64px;
  z-index: 10;
}

.prob-card-num {
  font-size: 19px; font-weight: 700;
  color: rgba(255,255,255,0.25);
  letter-spacing: 0.06em;
  align-self: flex-end;
  margin-bottom: auto;
}

.prob-title {
  font-size: 68px; font-weight: 900;
  line-height: 1.12; letter-spacing: -0.02em;
  color: #fff; word-break: keep-all;
  margin-bottom: 32px;
}

.prob-card {
  background: rgba(255,255,255,0.95);
  border-radius: 24px;
  padding: 40px 48px;
  flex-shrink: 0;
}

.prob-card-text {
  font-size: 26px; font-weight: 400;
  line-height: 1.75; color: #212529;
  word-break: keep-all; text-align: center;
}

.prob-card-text strong {
  font-weight: 700; color: var(--theme-dark);
}

.prob-emphasis {
  margin-top: 20px;
  font-size: 28px; font-weight: 700;
  color: var(--theme-primary);
  text-align: center;
}
</style>
</head>
<body>
<div class="card-canvas">
  {% set mode = slot_mode or 'bg' %}
  {% if bg_image and mode == 'inset_right' %}
    <div class="inset-right-panel"><img src="{{ bg_image }}" alt=""></div>
  {% else %}
    {% if bg_image %}<img class="bg-photo" src="{{ bg_image }}" alt="">{% endif %}
    <div class="prob-overlay"></div>
  {% endif %}

  <div class="prob-body" {% if mode == 'inset_right' and bg_image %}style="right:420px;"{% endif %}>
    <div class="prob-card-num">{{ card_num }}</div>
    <div class="prob-title">{{ title }}</div>
    <div class="prob-card">
      <div class="prob-card-text">{{ body }}</div>
      {% if emphasis %}<div class="prob-emphasis">{{ emphasis }}</div>{% endif %}
    </div>
  </div>
</div>
</body>
</html>
