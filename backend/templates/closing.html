<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
{% include '_shared.css' %}
:root { --theme-primary: {{ theme_primary }}; --theme-dark: {{ theme_dark }}; }

.card-canvas {
  background: var(--theme-dark);
  display: flex; flex-direction: column;
  align-items: center;
  padding: 72px 68px 64px;
}

.cl-icon {
  width: 72px; height: 72px; border-radius: 50%;
  background: rgba(255,255,255,0.12);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 24px; flex-shrink: 0;
}

.cl-icon-inner {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--theme-primary);
}

.cl-title {
  font-size: 64px; font-weight: 900;
  line-height: 1.15; letter-spacing: -0.02em;
  color: #fff; word-break: keep-all;
  text-align: center; margin-bottom: 8px;
}

.cl-title-accent { color: var(--theme-primary); }

.cl-card {
  width: 100%;
  background: rgba(255,255,255,0.97);
  border-radius: 24px;
  padding: 36px 44px;
  display: flex; flex-direction: column;
  gap: 20px;
  margin-top: 32px;
  flex: 1;
}

.cl-body {
  font-size: 24px; font-weight: 400;
  line-height: 1.75; color: #212529;
  word-break: keep-all; text-align: center;
}

.cl-body strong { font-weight: 700; }

.cl-inner-image {
  border-radius: 16px; overflow: hidden;
  flex-shrink: 0; height: 240px;
}

.cl-inner-image img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
}
</style>
</head>
<body>
<div class="card-canvas">

  <div class="cl-icon"><div class="cl-icon-inner"></div></div>

  <div class="cl-title">
    {{ title_white }}
    {% if title_accent %}
    <span class="cl-title-accent">{{ title_accent }}</span>
    {% endif %}
  </div>

  <div class="cl-card">
    <div class="cl-body">{{ body }}</div>
    {% if inner_image %}
    <div class="cl-inner-image">
      <img src="{{ inner_image }}" alt="">
    </div>
    {% endif %}
  </div>

</div>
</body>
</html>
